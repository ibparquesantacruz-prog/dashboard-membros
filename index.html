<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Gerenciamento de Membros</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.0/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #4e73df;
            --secondary-color: #858796;
            --success-color: #1cc88a;
            --info-color: #36b9cc;
            --warning-color: #f6c23e;
            --danger-color: #e74a3b;
            --light-bg: #f8f9fc;
        }
        body { background-color: var(--light-bg); font-family: 'Nunito', Roboto, sans-serif; }
        .sidebar { min-height: 100vh; background: linear-gradient(180deg, var(--primary-color) 10%, #224abe 100%); }
        .sidebar-heading { padding: 20px 0; color: white; text-align: center; font-weight: 800; }
        .nav-link { color: rgba(255,255,255,0.8); padding: 1rem; font-weight: 600; }
        .nav-link:hover, .nav-link.active { color: white; background-color: rgba(255,255,255,0.1); }
        .main-content { margin-left: 220px; padding: 20px; width: calc(100% - 220px); }
        .card-dashboard { border: none; border-radius: 10px; box-shadow: 0 0.15rem 1.75rem 0 rgba(58,59,69,.15); }
        .table-responsive { max-height: 500px; border-radius: 10px; }
        @media (max-width:768px){ .sidebar{width:100%; position:relative;} .main-content{margin-left:0;width:100%;} }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-3 col-lg-2 sidebar px-0">
            <div class="sidebar-heading">Dashboard Membros</div>
            <ul class="nav flex-column">
                <li class="nav-item"><a class="nav-link active" href="#" data-bs-target="dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="#" data-bs-target="membros"><i class="bi bi-people-fill"></i> Gerenciar Membros</a></li>
                <li class="nav-item"><a class="nav-link" href="#" data-bs-target="relatorios"><i class="bi bi-bar-chart-fill"></i> Relatórios</a></li>
                <li class="nav-item"><a class="nav-link" href="#" data-bs-target="importar"><i class="bi bi-upload"></i> Importar CSV</a></li>
                <li class="nav-item mt-4"><a class="nav-link" href="#" id="backupBtn"><i class="bi bi-cloud-arrow-down"></i> Backup</a></li>
                <li class="nav-item"><a class="nav-link" href="#" id="restoreBtn"><i class="bi bi-cloud-arrow-up"></i> Restaurar</a></li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="col-md-9 col-lg-10 main-content">
            <!-- Dashboard Section -->
            <div class="content-section" id="dashboard-section">
                <h2 class="mb-4">Dashboard</h2>
                <div class="row mb-4">
                    <div class="col-xl-3 col-md-6 mb-4">
                        <div class="card card-dashboard border-left-primary h-100 py-2">
                            <div class="card-body d-flex justify-content-between">
                                <div>
                                    <div class="text-xs font-weight-bold text-primary text-uppercase mb-1">Total de Membros</div>
                                    <div class="h5 mb-0 font-weight-bold text-gray-800" id="total-membros">0</div>
                                </div>
                                <i class="bi bi-people-fill fa-2x text-gray-300"></i>
                            </div>
                        </div>
                    </div>
                    <div class="col-xl-3 col-md-6 mb-4">
                        <div class="card card-dashboard border-left-success h-100 py-2">
                            <div class="card-body d-flex justify-content-between">
                                <div>
                                    <div class="text-xs font-weight-bold text-success text-uppercase mb-1">Membros Ativos</div>
                                    <div class="h5 mb-0 font-weight-bold text-gray-800" id="ativos">0</div>
                                </div>
                                <i class="bi bi-check-circle fa-2x text-gray-300"></i>
                            </div>
                        </div>
                    </div>
                    <div class="col-xl-3 col-md-6 mb-4">
                        <div class="card card-dashboard border-left-info h-100 py-2">
                            <div class="card-body d-flex justify-content-between">
                                <div>
                                    <div class="text-xs font-weight-bold text-info text-uppercase mb-1">Membros Batizados</div>
                                    <div class="h5 mb-0 font-weight-bold text-gray-800" id="batizados">0</div>
                                </div>
                                <i class="bi bi-droplet fa-2x text-gray-300"></i>
                            </div>
                        </div>
                    </div>
                    <div class="col-xl-3 col-md-6 mb-4">
                        <div class="card card-dashboard border-left-warning h-100 py-2">
                            <div class="card-body d-flex justify-content-between">
                                <div>
                                    <div class="text-xs font-weight-bold text-warning text-uppercase mb-1">Aniversariantes</div>
                                    <div class="h5 mb-0 font-weight-bold text-gray-800" id="aniversariantes">0</div>
                                </div>
                                <i class="bi bi-gift fa-2x text-gray-300"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Gerenciar Membros Section -->
            <div class="content-section d-none" id="membros-section">
                <h2>Gerenciar Membros</h2>
                <div class="card card-dashboard mt-3">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped table-hover">
                                <thead class="table-dark">
                                    <tr><th>Nome</th><th>Status</th><th>Sexo</th><th>Membro</th><th>Batizado</th><th>Celular</th><th>Ações</th></tr>
                                </thead>
                                <tbody id="membrosTableBody"></tbody>
                            </table>
                        </div>
                        <nav aria-label="Page navigation" class="mt-3">
                            <ul class="pagination justify-content-center" id="pagination"></ul>
                        </nav>
                    </div>
                </div>
            </div>

            <!-- Relatórios Section -->
            <div class="content-section d-none" id="relatorios-section">
                <h2 class="mb-4">Relatórios</h2>
                <div class="card card-dashboard mb-4">
                    <div class="card-body row">
                        <div class="col-md-4 mb-2">
                            <select class="form-select" id="relatorioTipo">
                                <option value="status">Por Status</option>
                                <option value="sexo">Por Sexo</option>
                                <option value="batismo">Por Batismo</option>
                                <option value="estadoCivil">Por Estado Civil</option>
                                <option value="membro">Por Tipo de Membro</option>
                                <option value="aniversariantes">Aniversariantes</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-2"><button class="btn btn-primary w-100" id="gerarRelatorioBtn">Gerar Relatório</button></div>
                        <div class="col-md-4 mb-2"><button class="btn btn-success w-100" id="exportarRelatorioBtn">Exportar para CSV</button></div>
                    </div>
                </div>
                <div class="card card-dashboard">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped">
                                <thead class="table-dark"><tr id="relatorioHeader"></tr></thead>
                                <tbody id="relatorioBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script>
let membros = [];
let currentPage = 1;
const itemsPerPage = 10;

// Função de relatório (corrigida e expandida)
function generateReport() {
    const reportType = document.getElementById('relatorioTipo').value;
    const relatorioHeader = document.getElementById('relatorioHeader');
    const relatorioBody = document.getElementById('relatorioBody');
    relatorioHeader.innerHTML = ''; relatorioBody.innerHTML = '';

    let headers = [];

    if (reportType === 'aniversariantes') {
        const mes = prompt("Digite o número do mês (1-12):");
        if (!mes || isNaN(mes) || mes < 1 || mes > 12) { alert("Mês inválido."); return; }
        headers = ['Nome','Data de Nascimento'];
        headers.forEach(h => { const th=document.createElement('th'); th.textContent=h; relatorioHeader.appendChild(th); });
        const aniversariantes = membros.filter(m=> m.DataNasc && (new Date(m.DataNasc).getMonth()+1)==mes);
        aniversariantes.forEach(m=>{
            const row=document.createElement('tr');
            row.innerHTML=`<td>${m.Nome}</td><td>${m.DataNasc}</td>`;
            relatorioBody.appendChild(row);
        });
        return;
    }

    let field;
    switch(reportType){
        case 'status': headers=['Status','Quantidade','Percentual','Nomes']; field='Status'; break;
        case 'sexo': headers=['Sexo','Quantidade','Percentual','Nomes']; field='Sexo'; break;
        case 'batismo': headers=['Batizado','Quantidade','Percentual','Nomes']; field='Batizado'; break;
        case 'estadoCivil': headers=['Estado Civil','Quantidade','Percentual','Nomes']; field='EstadoCivil'; break;
        case 'membro': headers=['Tipo de Membro','Quantidade','Percentual','Nomes']; field='Membro'; break;
    }
    headers.forEach(h => { const th=document.createElement('th'); th.textContent=h; relatorioHeader.appendChild(th); });
    const reportData = calculatePercentage(membros, field);
    for(const [key,val] of Object.entries(reportData)){
        const nomes = membros.filter(m=>(m[field]||'Não informado')===key).map(m=>m.Nome).join(", ");
        const row=document.createElement('tr');
        row.innerHTML=`<td>${key}</td><td>${val.count}</td><td>${val.percentage}%</td><td>${nomes}</td>`;
        relatorioBody.appendChild(row);
    }
}

function calculatePercentage(data, field){
    const counts={}; data.forEach(item=>{ const v=item[field]||'Não informado'; counts[v]=(counts[v]||0)+1; });
    const total=data.length; const res={};
    for(const [k,c] of Object.entries(counts)){ res[k]={count:c,percentage:((c/total)*100).toFixed(2)}; }
    return res;
}

// Exportar relatório (com nomes incluídos)
function exportReport() {
    const reportType = document.getElementById('relatorioTipo').value;

    if (reportType === 'aniversariantes') {
        const mes = prompt("Digite o número do mês (1-12):");
        if (!mes || isNaN(mes) || mes < 1 || mes > 12) { alert("Mês inválido."); return; }
        const aniversariantes = membros.filter(m=> m.DataNasc && (new Date(m.DataNasc).getMonth()+1)==mes);
        let csv = 'Nome,Data de Nascimento\\n';
        aniversariantes.forEach(m=>{ csv += `"${m.Nome}","${m.DataNasc}"\\n`; });
        const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
        const link=document.createElement('a'); link.href=URL.createObjectURL(blob);
        link.download=`relatorio_aniversariantes_mes_${mes}.csv`; link.click(); return;
    }

    let field; switch(reportType){
        case 'status': field='Status'; break;
        case 'sexo': field='Sexo'; break;
        case 'batismo': field='Batizado'; break;
        case 'estadoCivil': field='EstadoCivil'; break;
        case 'membro': field='Membro'; break;
    }
    const reportData=calculatePercentage(membros,field);
    let csv='Categoria,Quantidade,Percentual,Nomes\\n';
    for(const [key,val] of Object.entries(reportData)){
        const nomes=membros.filter(m=>(m[field]||'Não informado')===key).map(m=>m.Nome).join("; ");
        csv+=`"${key}",${val.count},${val.percentage}%,"${nomes}"\\n`;
    }
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
    const link=document.createElement('a'); link.href=URL.createObjectURL(blob);
    link.download=`relatorio_${reportType}.csv`; link.click();
}
</script>
</body>
</html>
